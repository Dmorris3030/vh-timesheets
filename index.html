<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VH Timesheets">
<title>VH Timesheets — ValentiHeld</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/tabler-icons.min.css">
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --topbar-h:56px;--bottom-nav-h:60px;
  --bg:#fff;--bg2:#f5f5f7;--bg3:#f0f0f2;
  --text:#1d1d1f;--text2:#6e6e73;--text3:#aeaeb2;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.06);
  --accent:#185FA5;--accent2:#0C447C;
  --ok:#34c759;--warn:#ff9500;--err:#ff3b30;
  --r:14px;--r2:10px;--r3:8px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#000;--text:#fff;--text2:#aeaeb2;--text3:#6e6e73;--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.06)}
}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;font-size:14px;color:var(--text);background:var(--bg3);overscroll-behavior:none;-webkit-font-smoothing:antialiased}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:10px;height:var(--topbar-h);flex-shrink:0;position:sticky;top:0;z-index:50}
.logo img{height:30px;object-fit:contain;display:block}
.logo .fb{display:none;font-size:16px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.logo .fb span{color:var(--accent)}
.tr{display:flex;align-items:center;gap:8px;margin-left:auto}
select{font-size:12px;background:var(--bg2);border:0.5px solid var(--border);border-radius:8px;padding:6px 8px;color:var(--text);max-width:130px;-webkit-appearance:none;cursor:pointer;font-family:inherit}
.sd{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.sd.ok{background:var(--ok)}.sd.busy{background:var(--warn);animation:pulse 1s infinite}.sd.err{background:var(--err)}.sd.off{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.mc{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--bottom-nav-h);-webkit-overflow-scrolling:touch}
.bn{position:fixed;bottom:0;left:0;right:0;height:var(--bottom-nav-h);background:var(--bg);border-top:0.5px solid var(--border);display:flex;align-items:stretch;z-index:50;padding-bottom:env(safe-area-inset-bottom,0)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--text3);border:none;background:none;cursor:pointer;padding:6px 2px;position:relative;-webkit-appearance:none;font-family:inherit}
.nb.active{color:var(--accent)}
.nb .ti{font-size:22px}
.nbg{background:#ff3b30;color:#fff;border-radius:10px;padding:1px 5px;font-size:9px;position:absolute;top:6px;right:calc(50% - 22px);font-weight:600}
.pg{padding:16px;max-width:680px;margin:0 auto}
.ph{margin-bottom:16px}
.ph h1{font-size:22px;font-weight:700;letter-spacing:-.3px}
.ph p{font-size:14px;color:var(--text2);margin-top:3px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:var(--r2);font-size:15px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--text);-webkit-appearance:none;min-height:44px;font-family:inherit;transition:opacity .1s}
.btn:active{opacity:.7}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-s{background:#3B6D11;color:#fff;border-color:#3B6D11}
.btn-d{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn-sm{padding:8px 14px;font-size:13px;min-height:36px;border-radius:var(--r3)}
.btn-bl{width:100%}
.acts{display:flex;gap:8px;margin-top:14px}
.sb{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.sb-dr{background:var(--bg2);color:var(--text2)}
.sb-su{background:#e3f0fb;color:#0C447C}
.sb-ap{background:#e6f3d8;color:#27500A}
.sb-re{background:#fde8e8;color:#791F1F}
.eb{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.eh{background:var(--bg2);padding:12px 16px;display:flex;align-items:flex-start;justify-content:space-between}
.ehl strong{font-size:15px;font-weight:600;display:block;letter-spacing:-.2px}
.ehl small{font-size:12px;color:var(--text2);margin-top:2px;display:block}
.et{text-align:right}
.et .cm{font-size:16px;font-weight:700;color:var(--text);display:block;letter-spacing:-.3px}
.et .br{font-size:11px;color:var(--text3);margin-top:1px;display:block}
.dts{display:flex;border-bottom:0.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.dts::-webkit-scrollbar{display:none}
.dt{flex-shrink:0;padding:10px 12px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.5px;min-width:48px;text-align:center;line-height:1.3}
.dt.active{color:var(--accent);border-bottom-color:var(--accent)}
.dt.hd{color:var(--text)}
.dt.hd.active{color:var(--accent)}
.dps{display:flex;transition:transform .28s cubic-bezier(.4,0,.2,1);will-change:transform}
.dp{flex-shrink:0;width:100%;padding:16px}
.fg{margin-bottom:14px}
.fl{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:block}
.di{width:100%;font-size:16px;padding:11px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit}
.di:focus{outline:none;border-color:var(--accent)}
.di.hrs{font-size:28px;font-weight:700;text-align:center;padding:14px;letter-spacing:-.5px}
.eqb{width:100%;display:flex;flex-direction:column;align-items:flex-start;padding:12px 14px;font-size:14px;border-radius:var(--r3);cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--text2);min-height:44px;gap:5px;font-family:inherit}
.eqb.he{background:#e3f0fb;color:var(--accent);border-color:var(--accent)}
.eqb .eqh{display:flex;align-items:center;gap:6px;width:100%;font-weight:500}
.eqb .eqi{font-size:12px;color:#0C447C;font-weight:600;padding-left:2px}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.md{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92dvh;overflow-y:auto;padding:20px 16px;padding-bottom:calc(20px + env(safe-area-inset-bottom,0))}
.mh{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.md h2{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.md p{font-size:14px;color:var(--text2);margin-bottom:14px}
.fr{margin-bottom:14px}
.fr label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fr input,.fr select,.fr textarea{width:100%;padding:12px 14px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit}
.fr input:focus,.fr select:focus,.fr textarea:focus{outline:none;border-color:var(--accent)}
.fr textarea{height:80px;resize:none;font-size:15px}
.eqe{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;padding:12px 14px;border-bottom:0.5px solid var(--border2)}
.eqe:last-child{border-bottom:none}
.eqbox{border:0.5px solid var(--border);border-radius:var(--r3);margin-bottom:12px}
.eqe input{padding:10px 12px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);width:100%;-webkit-appearance:none;font-family:inherit}
.mf{display:flex;gap:8px;margin-top:18px;padding-top:14px;border-top:0.5px solid var(--border)}
.mf .btn{flex:1}
.si{width:100%;padding:12px 14px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);margin-bottom:8px;-webkit-appearance:none;font-family:inherit}
.si:focus{outline:none;border-color:var(--accent)}
.sl{max-height:220px;overflow-y:auto;border:0.5px solid var(--border);border-radius:var(--r3)}
.sli{display:flex;align-items:center;gap:8px;padding:13px 14px;cursor:pointer;font-size:14px;border-bottom:0.5px solid var(--border2)}
.sli:last-child{border-bottom:none}
.sli:active{background:var(--bg2)}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.sc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.sc .lbl{font-size:12px;color:var(--text2);margin-bottom:4px;font-weight:500}
.sc .val{font-size:26px;font-weight:700;letter-spacing:-.5px}
.ib{background:#e3f0fb;border:0.5px solid #b5d4f4;border-radius:var(--r3);padding:12px 14px;font-size:14px;color:#0C447C;margin-bottom:12px;display:flex;gap:10px;align-items:flex-start}
.syb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);background:var(--bg2);border-radius:var(--r3);padding:10px 14px;margin-bottom:14px}
.nd{text-align:center;padding:56px 20px;color:var(--text3);font-size:15px}
.nd .ti{font-size:40px;display:block;margin-bottom:12px}
.uc{display:flex;align-items:center;gap:1px;cursor:pointer}
.av{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rb{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:#e3f0fb;color:#0C447C}
.rb.adm{background:#e6f3d8;color:#27500A}
.div{height:0.5px;background:var(--border);margin:14px 0}
.tb{width:100%;padding:10px 12px;font-size:13px;font-family:'SF Mono',Menlo,Monaco,monospace;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);resize:none;height:80px}
.toast{position:fixed;bottom:calc(var(--bottom-nav-h) + 12px);left:16px;right:16px;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r3);padding:14px 16px;font-size:15px;font-weight:500;z-index:300;animation:tin .25s cubic-bezier(.34,1.56,.64,1);text-align:center;max-width:400px;margin:0 auto;box-shadow:0 4px 24px rgba(0,0,0,.12)}
.toast.success{border-color:#34c759;background:#e6f3d8;color:#27500A}
.toast.error{border-color:#ff3b30;background:#fde8e8;color:#791F1F}
@keyframes tin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
</style>
</head>

async function initApp(){
  try{mi=new msal.PublicClientApplication(MCFG);await mi.initialize();
    const rsp=await mi.handleRedirectPromise();
    if(rsp&&rsp.account)await onIn(rsp.account);
    else{const ac=mi.getAllAccounts();if(ac.length>0)await onIn(ac[0]);}
  }catch(e){console.warn(e);}
  initWeeks();updUC();updNav();render();updBadge();
}
async function getTok(){
  if(!mi||!auth.account)return null;
  try{const r=await mi.acquireTokenSilent({scopes:SCOPES,account:auth.account});return r.accessToken;}
  catch(e){if(e instanceof msal.InteractionRequiredAuthError)await mi.acquireTokenRedirect({scopes:SCOPES,account:auth.account});return null;}
}
async function signIn(){if(!mi){toast('Still loading...','error');return;}await mi.loginRedirect({scopes:SCOPES,prompt:'select_account'});}
async function signOut(){const ac=auth.account;auth={user:null,isAdmin:false,account:null};updUC();updNav();setSS('off');render();if(mi&&ac)await mi.logoutRedirect({account:ac});}
async function onIn(account){
  auth.account=account;const tok=await getTok();if(!tok)return;
  try{const r=await fetch('https://graph.microsoft.com/v1.0/me',{headers:{Authorization:'Bearer '+tok}});const d=await r.json();
    const em=(d.userPrincipalName||'').toLowerCase();
    auth.user={name:d.displayName||d.userPrincipalName,email:d.userPrincipalName,initials:(d.displayName||'U').split(' ').map(p=>p[0]).join('').slice(0,2).toUpperCase()};
    auth.isAdmin=S.adminEmails.map(e=>e.toLowerCase()).includes(em);
    updUC();updNav();setSS('busy');await loadSP();render();
    toast('Signed in as '+auth.user.name+(auth.isAdmin?' · Admin':''),'success');
  }catch(e){console.error(e);}
}
function updNav(){const x=document.getElementById('nav-export');if(x)x.style.display=auth.isAdmin?'flex':'none';}
function updUC(){const c=document.getElementById('uc');if(!c)return;
  if(auth.user){c.innerHTML=`<span class="uc" onclick="showUM()"><span class="av">${auth.user.initials}</span></span>`;}
  else{c.innerHTML=`<button class="btn btn-p btn-sm" onclick="signIn()" style="white-space:nowrap"><svg width="13" height="13" viewBox="0 0 21 21" style="flex-shrink:0"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg> Sign in</button>`;}
}
function showUM(){showM(`<div class="mh"></div><div style="display:flex;align-items:center;gap:14px;margin-bottom:18px"><span class="av" style="width:52px;height:52px;font-size:20px;flex-shrink:0">${auth.user.initials}</span><div><strong style="font-size:17px;letter-spacing:-.3px">${auth.user.name}</strong><br><span style="font-size:13px;color:var(--text2)">${auth.user.email}</span><br><span class="rb${auth.isAdmin?' adm':''}" style="margin-top:6px;display:inline-flex">${auth.isAdmin?'Administrator':'User'}</span></div></div><button class="btn btn-d btn-bl" onclick="signOut();closeM()"><i class="ti ti-logout"></i> Sign out</button>`,'um');}
function setSS(s){const d=document.getElementById('sd');if(d)d.className='sd '+s;}
async function saveSP(){const tok=await getTok();if(!tok){toast('Sign in to sync.','error');return;}setSS('busy');
  try{const p=JSON.stringify({weeks:S.weeks,managers:S.managers,adminEmails:S.adminEmails,settings:S.settings,savedAt:new Date().toISOString(),savedBy:auth.user?.name});
    const r=await fetch(`https://graph.microsoft.com/v1.0/drives/${SDID}/root:/${SFN}:/content`,{method:'PUT',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:p});
    if(!r.ok)throw new Error(r.status);setSS('ok');toast('Saved.','success');
  }catch(e){setSS('err');toast('Sync failed: '+e.message,'error');}
}
async function loadSP(){const tok=await getTok();if(!tok)return;setSS('busy');
  try{const r=await fetch(`https://graph.microsoft.com/v1.0/drives/${SDID}/root:/${SFN}:/content`,{headers:{Authorization:'Bearer '+tok}});
    if(r.status===404){setSS('ok');return;}if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    if(d.weeks)S.weeks={...S.weeks,...d.weeks};if(d.managers)S.managers=d.managers;if(d.adminEmails)S.adminEmails=d.adminEmails;if(d.settings)S.settings={...S.settings,...d.settings};
    if(auth.user){auth.isAdmin=S.adminEmails.map(e=>e.toLowerCase()).includes(auth.user.email.toLowerCase());updNav();}
    initWeeks();updBadge();setSS('ok');
  }catch(e){setSS('err');toast('Load failed: '+e.message,'error');}
}

function fw(iso){const d=new Date(iso+'T12:00:00');return'Wk of '+d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fd(iso){const d=new Date(iso+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fs(iso){const d=new Date(iso+'T12:00:00');return`${d.getMonth()+1}/${d.getDate()}`;}
function wd(we){const end=new Date(we+'T12:00:00');return DK.map((_,i)=>{const d=new Date(end);d.setDate(end.getDate()-(6-i));return d.toISOString().split('T')[0];});}
function initWeeks(){const sel=document.getElementById('ws');if(!sel)return;
  const ex=new Set(Array.from(sel.options).map(o=>o.value));
  for(let i=-1;i<=4;i++){const dt=new Date();dt.setDate(dt.getDate()+(6-dt.getDay())+i*7);const iso=dt.toISOString().split('T')[0];
    if(!ex.has(iso)){const o=document.createElement('option');o.value=iso;o.textContent=fw(iso);sel.appendChild(o);ex.add(iso);}if(!S.weeks[iso])S.weeks[iso]=bw();}
  Object.keys(S.weeks).forEach(iso=>{if(!ex.has(iso)){const o=document.createElement('option');o.value=iso;o.textContent=fw(iso);sel.appendChild(o);ex.add(iso);}});
  if(!S.currentWeek){const dt=new Date();dt.setDate(dt.getDate()+(6-dt.getDay()));S.currentWeek=dt.toISOString().split('T')[0];}sel.value=S.currentWeek;
}
function changeWeek(w){S.currentWeek=w;if(!S.weeks[w])S.weeks[w]=bw();adys={};render();updBadge();}
function showPage(p){if(p==='export'&&!auth.isAdmin){toast('Admins only.','error');return;}cp=p;document.querySelectorAll('.nb[id^=nav-]').forEach(b=>b.classList.remove('active'));const nb=document.getElementById('nav-'+p);if(nb)nb.classList.add('active');render();}
function render(){const wk=S.weeks[S.currentWeek];const ts=document.getElementById('ts');
  if(ts&&wk)ts.innerHTML=`<span class="sb sb-${wk.status.slice(0,2)}" style="font-size:11px;padding:3px 10px">${wk.status.charAt(0).toUpperCase()+wk.status.slice(1)}</span>`;
  updNav();if(cp==='entry')rEntry();else if(cp==='review')rReview();else if(cp==='approval')rApproval();else if(cp==='export')rExport();else if(cp==='settings')rSettings();
}
function ge(wk,eid,dt,f){return(wk.entries[`${eid}:${dt}`]||{})[f]||'';}
function se(eid,dt,f,v){const wk=S.weeks[S.currentWeek];const k=`${eid}:${dt}`;if(!wk.entries[k])wk.entries[k]={};if(v===''||v===null)delete wk.entries[k][f];else wk.entries[k][f]=v;}
function ct(wk,eid){const dates=wd(S.currentWeek);let l=0,e=0;dates.forEach(dt=>{l+=parseFloat(ge(wk,eid,dt,'hours'))||0;(wk.equipmentEntries[`${eid}:${dt}`]||[]).forEach(x=>e+=parseFloat(x.hours)||0);});return{l,e,c:l+e};}
function rEntry(){const wk=S.weeks[S.currentWeek];const dates=wd(S.currentWeek);const ro=wk.status!=='draft';
  let h=`<div class="pg">`;
  if(auth.user){h+=`<div class="syb"><span class="sd ok" style="flex-shrink:0"></span><span style="flex:1;font-size:13px">${auth.user.name}${auth.isAdmin?' <span class="rb adm" style="margin-left:4px">Admin</span>':''}</span><button class="btn btn-sm" onclick="saveSP()" style="flex-shrink:0"><i class="ti ti-cloud-upload"></i></button><button class="btn btn-sm" onclick="loadSP()" style="flex-shrink:0"><i class="ti ti-refresh"></i></button></div>`;}
  else{h+=`<div class="syb"><span class="sd off" style="flex-shrink:0"></span><span style="flex:1;font-size:14px">Not signed in</span><button class="btn btn-p btn-sm" onclick="signIn()" style="flex-shrink:0">Sign in</button></div>`;}
  if(ro)h+=`<div class="ib"><i class="ti ti-lock"></i><span>Timesheet is <strong>${wk.status}</strong>. Return to draft to edit.</span></div>`;
  h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><strong style="font-size:16px;font-weight:700;letter-spacing:-.2px">Crew — ${wk.employees.length}/20</strong><button class="btn btn-sm" style="margin-left:auto" onclick="showEM()" ${ro?'disabled':''}><i class="ti ti-users"></i> Manage crew</button></div>`;
  if(!wk.employees.length){h+=`<div class="nd"><i class="ti ti-users"></i>No crew added.<br>Tap "Manage crew" to get started.</div>`;}
  else{wk.employees.forEach(eid=>{const emp=EMPS.find(e=>e.id===eid);if(!emp)return;
    const{l,e,c}=ct(wk,eid);const ad=adys[eid]||0;
    const dhd=dates.map(dt=>{const en=wk.entries[`${eid}:${dt}`]||{};const eq=wk.equipmentEntries[`${eid}:${dt}`]||[];return en.hours||en.job||en.phase||eq.length>0;});
    h+=`<div class="eb"><div class="eh"><div class="ehl"><strong>${emp.name}</strong><small>${emp.title} · ${emp.id}</small></div><div class="et"><span class="cm">${c.toFixed(1)}h</span><span class="br">L:${l.toFixed(1)} E:${e.toFixed(1)}</span></div></div>
      <div class="dts" id="dts-${eid}">${DAYS.map((day,di)=>`<div class="dt${di===ad?' active':''}${dhd[di]?' hd':''}" onclick="swDay('${eid}',${di})">${day}<br><span style="font-size:9px;font-weight:500;opacity:.7">${fs(dates[di])}</span></div>`).join('')}</div>
      <div class="dps" id="dps-${eid}" style="transform:translateX(-${ad*100}%)">
        ${dates.map((dt,di)=>{const job=ge(wk,eid,dt,'job');const ph=ge(wk,eid,dt,'phase');const hrs=ge(wk,eid,dt,'hours');const eqs=wk.equipmentEntries[`${eid}:${dt}`]||[];const he=eqs.length>0;
          return`<div class="dp">
            <div class="fg"><span class="fl">Job #</span><input class="di" type="text" inputmode="text" value="${job}" ${ro?'disabled':''} placeholder="Enter job number" oninput="se('${eid}','${dt}','job',this.value)"/></div>
            <div class="fg"><span class="fl">Phase Code</span><input class="di" type="text" inputmode="text" value="${ph}" ${ro?'disabled':''} placeholder="Enter phase code" oninput="se('${eid}','${dt}','phase',this.value)"/></div>
            <div class="fg"><span class="fl">Equipment</span><button class="eqb${he?' he':''}" onclick="${ro?'':'showEQ(\''+eid+'\',\''+dt+'\')'}" ${ro?'disabled':''}><div class="eqh"><i class="ti ti-tool"></i> ${he?eqs.length+' piece'+(eqs.length>1?'s':'')+' logged':'+ Add equipment'}</div>${he?eqs.map(x=>`<span class="eqi">#${x.number} — ${x.hours}h</span>`).join(''):''}</button></div>
            <div class="fg"><span class="fl">Labor Hours</span><input class="di hrs" type="number" inputmode="decimal" min="0" max="24" step="0.5" value="${hrs}" ${ro?'disabled':''} placeholder="0" oninput="se('${eid}','${dt}','hours',this.value);rTot('${eid}')"/></div>
          </div>`;}).join('')}
      </div></div>`;});}
  if(!ro&&wk.employees.length)h+=`<div class="acts"><button class="btn btn-bl" onclick="saveSP()"><i class="ti ti-device-floppy"></i> Save draft</button><button class="btn btn-p btn-bl" onclick="showPage('review')"><i class="ti ti-arrow-right"></i> Review & submit</button></div>`;
  h+=`</div>`;document.getElementById('mc').innerHTML=h;
}
function swDay(eid,di){adys[eid]=di;document.querySelectorAll(`#dts-${eid} .dt`).forEach((t,i)=>t.classList.toggle('active',i===di));const p=document.getElementById(`dps-${eid}`);if(p)p.style.transform=`translateX(-${di*100}%)`;}
function rTot(eid){const wk=S.weeks[S.currentWeek];const{l,e,c}=ct(wk,eid);const bl=document.getElementById(`dps-${eid}`)?.closest('.eb');if(!bl)return;const cm=bl.querySelector('.cm');const br=bl.querySelector('.br');if(cm)cm.textContent=c.toFixed(1)+'h';if(br)br.textContent=`L:${l.toFixed(1)} E:${e.toFixed(1)}`;}
function showEQ(eid,dt){const wk=S.weeks[S.currentWeek];const k=`${eid}:${dt}`;const eqs=JSON.parse(JSON.stringify(wk.equipmentEntries[k]||[]));if(!eqs.length)eqs.push({number:'',hours:''});const emp=EMPS.find(e=>e.id===eid);eqmc=eqs.length;
  showM(`<div class="mh"></div><h2><i class="ti ti-tool"></i> Equipment hours</h2><p>${emp.name} · ${fd(dt)}</p>
    <div class="eqbox" id="eqr">${eqs.map((eq,i)=>eqRow(eq,i)).join('')}</div>
    <button class="btn btn-bl" style="margin-bottom:14px" onclick="addER()"><i class="ti ti-plus"></i> Add another equipment</button>
    <div style="border-top:0.5px solid var(--border);padding-top:14px"><label class="fl">Search equipment</label>
      <input class="si" type="text" inputmode="search" placeholder="Type number or description..." oninput="fEQ(this.value)"/>
      <div id="eqres" style="display:none" class="sl"></div></div>
    <div class="mf"><button class="btn" onclick="closeM()">Cancel</button><button class="btn btn-p" onclick="saveEQ('${eid}','${dt}')"><i class="ti ti-check"></i> Save</button></div>`,'eqm');
}
function eqRow(eq,i){return`<div class="eqe" id="eqe-${i}"><div><label class="fl" style="font-size:11px">Equip #</label><input type="text" inputmode="text" id="eqn-${i}" value="${eq.number||''}" placeholder="e.g. 308" style="width:100%;padding:11px 12px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit"/></div><div><label class="fl" style="font-size:11px">Hours</label><input type="number" inputmode="decimal" id="eqh-${i}" value="${eq.hours||''}" min="0" max="24" step="0.5" placeholder="0" style="width:100%;padding:11px 12px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit"/></div><button class="btn btn-sm btn-d" style="align-self:flex-end;min-height:44px" onclick="document.getElementById('eqe-${i}').remove()"><i class="ti ti-trash"></i></button></div>`;}
function addER(){const c=document.getElementById('eqr');const d=document.createElement('div');d.innerHTML=eqRow({number:'',hours:''},eqmc++);c.appendChild(d.firstChild);}
function fEQ(q){const r=document.getElementById('eqres');if(!q){r.style.display='none';return;}const ql=q.toLowerCase();const hits=EQ.filter(e=>e.number.toLowerCase().startsWith(ql)||e.description.toLowerCase().includes(ql)).slice(0,10);if(!hits.length){r.style.display='none';return;}r.style.display='block';r.innerHTML=hits.map(e=>`<div class="sli" onclick="pkEQ('${e.number}')"><strong style="flex-shrink:0;font-size:14px">#${e.number}</strong><span style="color:var(--text2);margin-left:10px;font-size:13px">${e.description}</span></div>`).join('');}
function pkEQ(num){const ins=document.querySelectorAll('[id^=eqn-]');let p=false;ins.forEach(i=>{if(!i.value&&!p){i.value=num;p=true;}});if(!p){addER();setTimeout(()=>{const ins=document.querySelectorAll('[id^=eqn-]');if(ins.length)ins[ins.length-1].value=num;},50);}document.getElementById('eqres').style.display='none';}
function saveEQ(eid,dt){const wk=S.weeks[S.currentWeek];const k=`${eid}:${dt}`;const ns=document.querySelectorAll('[id^=eqn-]');const hs=document.querySelectorAll('[id^=eqh-]');const res=[];ns.forEach((n,i)=>{const num=n.value.trim();if(num)res.push({number:num,hours:parseFloat(hs[i]?hs[i].value:0)||0});});if(res.length)wk.equipmentEntries[k]=res;else delete wk.equipmentEntries[k];closeM();rEntry();}
function showEM(){const wk=S.weeks[S.currentWeek];showM(`<div class="mh"></div><h2>Manage crew</h2><p>Select up to 20 employees for this week.</p><input class="si" type="search" inputmode="search" placeholder="Search name or title..." oninput="fEM(this.value)"/><div class="sl" id="eml" style="max-height:50dvh">${EMPS.map(emp=>`<label class="sli" style="cursor:pointer"><input type="checkbox" value="${emp.id}" ${wk.employees.includes(emp.id)?'checked':''} onchange="togEM(this)" style="width:22px;height:22px;flex-shrink:0;accent-color:var(--accent)"/><div style="margin-left:6px"><strong style="font-size:15px">${emp.name}</strong><br><span style="font-size:12px;color:var(--text2)">${emp.title} · ${emp.id}</span></div></label>`).join('')}</div><div style="font-size:13px;color:var(--text2);margin-top:12px;text-align:center" id="ect">${wk.employees.length}/20 selected</div><div class="mf"><button class="btn btn-p btn-bl" onclick="closeM();rEntry()">Done</button></div>`,'emm');}
function togEM(cb){const wk=S.weeks[S.currentWeek];if(cb.checked){if(wk.employees.length>=20){cb.checked=false;toast('Max 20 employees.','error');return;}if(!wk.employees.includes(cb.value))wk.employees.push(cb.value);}else wk.employees=wk.employees.filter(e=>e!==cb.value);const c=document.getElementById('ect');if(c)c.textContent=wk.employees.length+'/20 selected';}
function fEM(q){document.querySelectorAll('#eml label').forEach(item=>{item.style.display=(!q||item.textContent.toLowerCase().includes(q.toLowerCase()))?'flex':'none';});}
function rReview(){const wk=S.weeks[S.currentWeek];const dates=wd(S.currentWeek);let tH=0,tD=0,tE=0;
  wk.employees.forEach(eid=>{dates.forEach(dt=>{const h=parseFloat(ge(wk,eid,dt,'hours'))||0;tH+=h;if(h>0)tD++;(wk.equipmentEntries[`${eid}:${dt}`]||[]).forEach(e=>tE+=parseFloat(e.hours)||0);});});
  let h=`<div class="pg"><div class="ph"><h1>Review & Submit</h1><p>${fw(S.currentWeek)}</p></div>`;
  h+=`<div class="sg"><div class="sc"><div class="lbl">Employees</div><div class="val">${wk.employees.length}</div></div><div class="sc"><div class="lbl">Labor hours</div><div class="val">${tH.toFixed(1)}</div></div><div class="sc"><div class="lbl">Equip hours</div><div class="val">${tE.toFixed(1)}</div></div><div class="sc"><div class="lbl">Total hours</div><div class="val">${(tH+tE).toFixed(1)}</div></div></div>`;
  h+=`<div class="card" style="padding:0;overflow:hidden">`;
  wk.employees.forEach((eid,idx)=>{const emp=EMPS.find(e=>e.id===eid);if(!emp)return;const{l,e,c}=ct(wk,eid);h+=`<div style="padding:13px 16px;${idx>0?'border-top:0.5px solid var(--border)':''}display:flex;align-items:center;justify-content:space-between"><div><strong style="font-size:14px">${emp.name}</strong><br><span style="font-size:12px;color:var(--text2)">${emp.title}</span></div><div style="text-align:right"><strong style="font-size:16px;font-weight:700;letter-spacing:-.3px">${c.toFixed(1)}h</strong><br><span style="font-size:11px;color:var(--text3)">L:${l.toFixed(1)} E:${e.toFixed(1)}</span></div></div>`;});
  h+=`</div>`;
  if(wk.status==='draft'){h+=`<div class="card"><strong style="font-size:17px;font-weight:700;display:block;margin-bottom:6px;letter-spacing:-.3px">Submit for approval</strong><p style="font-size:14px;color:var(--text2);margin-bottom:16px">Managers will be notified by email. Timesheet locks until approved.</p>
    <div class="fr"><label>Submitted by</label><input type="text" id="sb" placeholder="Your name" value="${auth.user?auth.user.name:''}"/></div>
    <div class="fr"><label>Notes (optional)</label><textarea id="sn" placeholder="Job numbers, special instructions..."></textarea></div>
    <div class="fr"><label>Send approval to</label>${S.managers.map((m,i)=>`<label style="display:flex;align-items:center;gap:12px;font-size:15px;margin-top:12px;cursor:pointer"><input type="checkbox" id="mg-${i}" checked style="width:22px;height:22px;accent-color:var(--accent)"/> <div>${m.name}<br><span style="font-size:13px;color:var(--text2)">${m.email}</span></div></label>`).join('')}</div>
    <button class="btn btn-p btn-bl" style="margin-top:8px" onclick="subTS()"><i class="ti ti-send"></i> Submit & notify managers</button></div>`;}
  else{h+=`<div class="ib"><i class="ti ti-info-circle"></i><div>Status: <strong>${wk.status}</strong>${wk.submittedBy?' · '+wk.submittedBy:''}${wk.approvedBy?' · Approved by '+wk.approvedBy:''}<br><button class="btn btn-sm" style="margin-top:10px" onclick="rToDraft()"><i class="ti ti-arrow-back"></i> Return to draft</button></div></div>`;}
  h+=`</div>`;document.getElementById('mc').innerHTML=h;
}
function subTS(){const wk=S.weeks[S.currentWeek];const by=document.getElementById('sb').value.trim();if(!by){toast('Enter your name.','error');return;}
  const mgrs=S.managers.filter((_,i)=>{const c=document.getElementById('mg-'+i);return c&&c.checked;});if(!mgrs.length){toast('Select at least one manager.','error');return;}
  wk.status='submitted';wk.submittedBy=by;wk.submittedAt=new Date().toISOString();wk.comments=document.getElementById('sn').value;
  const tot=Object.values(wk.entries).reduce((s,v)=>s+(parseFloat(v.hours)||0),0);
  mgrs.forEach(m=>{const sub=encodeURIComponent(`Timesheet Approval — ${fw(S.currentWeek)}`);const bod=encodeURIComponent(`Hi ${m.name},\n\nPlease approve the timesheet for ${fw(S.currentWeek)}.\n\nSubmitted by: ${by}\nEmployees: ${wk.employees.length}\nLabor hours: ${tot.toFixed(1)}\nNotes: ${wk.comments||'None'}\n\nOpen the VH Timesheet App to approve or return.\n\nThank you`);window.open(`mailto:${m.email}?subject=${sub}&body=${bod}`);});
  saveSP();updBadge();render();toast('Submitted!','success');
}
function rToDraft(){const wk=S.weeks[S.currentWeek];wk.status='draft';wk.submittedBy='';wk.submittedAt='';saveSP();updBadge();render();toast('Returned to draft.','success');}
function rApproval(){const pend=Object.entries(S.weeks).filter(([,w])=>['submitted','approved','rejected'].includes(w.status));
  let h=`<div class="pg"><div class="ph"><h1>Approvals</h1><p>Review and approve submitted timesheets.</p></div>`;
  if(!pend.length){h+=`<div class="nd"><i class="ti ti-shield-check"></i>No timesheets pending approval.</div>`;}
  else{pend.forEach(([iso,wk])=>{const tot=Object.values(wk.entries).reduce((s,v)=>s+(parseFloat(v.hours)||0),0);h+=`<div class="card"><div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px"><div><strong style="font-size:16px;font-weight:700;letter-spacing:-.3px">${fw(iso)}</strong><br><span style="font-size:13px;color:var(--text2)">${wk.submittedBy||'—'} · ${wk.employees.length} employees · ${tot.toFixed(1)}h</span></div><span class="sb sb-${wk.status.slice(0,2)}">${wk.status}</span></div>${wk.status==='submitted'&&auth.isAdmin?`<div style="display:flex;gap:8px"><button class="btn btn-s" style="flex:1" onclick="appWk('${iso}')"><i class="ti ti-check"></i> Approve</button><button class="btn btn-d" style="flex:1" onclick="retWk('${iso}')"><i class="ti ti-x"></i> Return</button></div>`:wk.status==='submitted'?`<div class="ib" style="margin:0"><i class="ti ti-clock"></i><span>Awaiting manager approval.</span></div>`:`<button class="btn btn-bl" onclick="vwWk('${iso}')"><i class="ti ti-eye"></i> View details</button>`}</div>`;});}
  h+=`</div>`;document.getElementById('mc').innerHTML=h;
}
function appWk(iso){const n=auth.user?auth.user.name:prompt('Your name:');if(!n)return;S.weeks[iso].status='approved';S.weeks[iso].approvedBy=n;S.weeks[iso].approvedAt=new Date().toISOString();saveSP();updBadge();render();toast('Approved!','success');}
function retWk(iso){const r=prompt('Reason for returning:');S.weeks[iso].status='draft';if(r)S.weeks[iso].comments=(S.weeks[iso].comments||'')+'\nReturned: '+r;S.weeks[iso].submittedBy='';saveSP();updBadge();render();toast('Returned to foreman.','success');}
function vwWk(iso){S.currentWeek=iso;document.getElementById('ws').value=iso;showPage('review');}
function rExport(){if(!auth.isAdmin){document.getElementById('mc').innerHTML=`<div class="pg"><div class="nd"><i class="ti ti-lock"></i>Admins only.</div></div>`;return;}
  const app=Object.entries(S.weeks).filter(([,w])=>w.status==='approved');
  let h=`<div class="pg"><div class="ph"><h1>Spectrum CSV Export</h1><p>Company code: <strong>VHI</strong></p></div>`;
  if(!app.length)h+=`<div class="nd"><i class="ti ti-file-x"></i>No approved timesheets yet.</div>`;
  else{app.forEach(([iso,wk])=>{const tot=Object.values(wk.entries).reduce((s,v)=>s+(parseFloat(v.hours)||0),0);h+=`<div class="card" style="display:flex;align-items:center;gap:12px"><div style="flex:1"><strong style="font-size:15px;font-weight:700;letter-spacing:-.2px">${fw(iso)}</strong><br><span style="font-size:13px;color:var(--text2)">${wk.employees.length} employees · ${tot.toFixed(1)}h · Approved by ${wk.approvedBy}</span></div><button class="btn btn-p btn-sm" onclick="expCSV('${iso}')"><i class="ti ti-download"></i> CSV</button></div>`;});}
  h+=`<div class="card" style="background:var(--bg2)"><strong style="font-size:15px;font-weight:700;display:block;margin-bottom:12px">Export settings</strong><div class="fr"><label>Company code</label><input type="text" value="${S.settings.companyCode}" oninput="S.settings.companyCode=this.value"/></div><div class="fr" style="margin:0"><label>Batch year prefix</label><input type="text" value="${S.settings.batchPrefix}" oninput="S.settings.batchPrefix=this.value"/></div></div></div>`;
  document.getElementById('mc').innerHTML=h;
}
function gpw(iso){const d=new Date(iso+'T12:00:00');const s=new Date(d.getFullYear(),0,1);return Math.ceil(((d-s)/86400000+s.getDay()+1)/7);}
function expCSV(iso){const wk=S.weeks[iso];const dates=wd(iso);const bc=S.settings.batchPrefix+String(gpw(iso)).padStart(2,'0');
  const hdr='Batch Code,Employee Code,Department,Pay Type,Hours,Job,Phase,Cost Type,Date,Message,Pay Rate Level ,Wage Code,Union/Pay Group,Workers Comp,State Tax Code,County Tax,Local Tax,Equipment Code,Equipment Hours,Quantity,Company Code,Pay Rate,Equip cost category,crew number,cost center,work order,site equipment,site component,contract,eq. work order';
  const rows=[hdr];
  wk.employees.forEach(eid=>{const emp=EMPS.find(e=>e.id===eid);if(!emp)return;
    dates.forEach(dt=>{const en=wk.entries[`${eid}:${dt}`]||{};const lh=parseFloat(en.hours)||0;const job=en.job||'';const ph=en.phase||'';const eq=wk.equipmentEntries[`${eid}:${dt}`]||[];const d=new Date(dt+'T12:00:00');const ds=`${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;const ct=emp.dept==='FLD'?'L':'';
      if(lh>0)rows.push(`${bc},${emp.id},${emp.dept},R,${lh},${job},${ph},${ct},${ds},,,,,,,,,,,,${S.settings.companyCode},,,,,,,,,,`);
      eq.forEach(x=>{if(x.hours>0)rows.push(`${bc},${emp.id},${emp.dept},ER,${x.hours},${job},${ph},${ct},${ds},,,,,,,,,,${x.number},${x.hours},,${S.settings.companyCode},,,,,,,,,,`);});
    });});
  const blob=new Blob([rows.join('\n')],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`time_cards_${iso}.csv`;a.click();toast('Downloaded!','success');
}
function rSettings(){let h=`<div class="pg"><div class="ph"><h1>Settings</h1></div>`;
  h+=`<div class="card"><strong style="font-size:16px;font-weight:700;display:block;margin-bottom:12px;letter-spacing:-.2px">Account</strong>
    ${auth.user?`<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px"><span class="av" style="width:50px;height:50px;font-size:18px;flex-shrink:0">${auth.user.initials}</span><div><strong style="font-size:15px">${auth.user.name}</strong><br><span style="font-size:13px;color:var(--text2)">${auth.user.email}</span><br><span class="rb${auth.isAdmin?' adm':''}" style="margin-top:6px;display:inline-flex">${auth.isAdmin?'Administrator':'User'}</span></div></div><div class="acts"><button class="btn" onclick="loadSP()" style="flex:1"><i class="ti ti-refresh"></i> Refresh</button><button class="btn btn-d" onclick="signOut()" style="flex:1"><i class="ti ti-logout"></i> Sign out</button></div>`:`<button class="btn btn-p btn-bl" onclick="signIn()">Sign in with Microsoft</button>`}
  </div>`;
  if(auth.isAdmin){
    h+=`<div class="card"><strong style="font-size:16px;font-weight:700;display:block;margin-bottom:6px;letter-spacing:-.2px">Administrators</strong><p style="font-size:14px;color:var(--text2);margin-bottom:14px">These emails have full admin access.</p>
      ${S.adminEmails.map((e,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)"><span class="rb adm" style="flex-shrink:0">Admin</span><span style="flex:1;font-size:14px">${e}</span><button class="btn btn-sm btn-d" onclick="rmAdm(${i})"><i class="ti ti-trash"></i></button></div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:14px"><input type="email" id="na" placeholder="email@valentiheld.com" style="flex:1;padding:11px 14px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit"/><button class="btn btn-p" onclick="addAdm()"><i class="ti ti-plus"></i></button></div></div>`;
    h+=`<div class="card"><strong style="font-size:16px;font-weight:700;display:block;margin-bottom:6px;letter-spacing:-.2px">Approval managers</strong><p style="font-size:14px;color:var(--text2);margin-bottom:14px">Receive approval emails when a timesheet is submitted.</p>
      ${S.managers.map((m,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:0.5px solid var(--border)"><div style="flex:1"><strong style="font-size:14px">${m.name}</strong><br><span style="font-size:13px;color:var(--text2)">${m.email}</span></div><button class="btn btn-sm btn-d" onclick="rmMgr(${i})"><i class="ti ti-trash"></i></button></div>`).join('')}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px"><input type="text" id="nn" placeholder="Full name" style="padding:11px 14px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit"/><input type="email" id="ne" placeholder="Email" style="padding:11px 14px;font-size:16px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r3);color:var(--text);-webkit-appearance:none;font-family:inherit"/></div>
      <button class="btn btn-p btn-bl" style="margin-top:10px" onclick="addMgr()"><i class="ti ti-plus"></i> Add manager</button></div>`;
    h+=`<div class="card"><strong style="font-size:16px;font-weight:700;display:block;margin-bottom:14px;letter-spacing:-.2px">Spectrum settings</strong><div class="fr"><label>Company code</label><input type="text" value="${S.settings.companyCode}" oninput="S.settings.companyCode=this.value"/></div><div class="fr" style="margin:0"><label>Batch year prefix</label><input type="text" value="${S.settings.batchPrefix}" oninput="S.settings.batchPrefix=this.value"/></div></div>`;
    h+=`<button class="btn btn-p btn-bl" onclick="saveSP()" style="margin-bottom:24px"><i class="ti ti-cloud-upload"></i> Save all settings to SharePoint</button>`;
  }
  h+=`</div>`;document.getElementById('mc').innerHTML=h;
}
function addAdm(){const e=document.getElementById('na').value.trim().toLowerCase();if(!e||!e.includes('@')){toast('Enter a valid email.','error');return;}if(S.adminEmails.includes(e)){toast('Already an admin.','error');return;}S.adminEmails.push(e);rSettings();toast('Admin added.','success');}
function rmAdm(i){S.adminEmails.splice(i,1);rSettings();}
function addMgr(){const n=document.getElementById('nn').value.trim();const e=document.getElementById('ne').value.trim();if(!n||!e){toast('Name and email required.','error');return;}S.managers.push({name:n,email:e,title:''});rSettings();toast('Manager added.','success');}
function rmMgr(i){S.managers.splice(i,1);rSettings();}
function updBadge(){const n=Object.values(S.weeks).filter(w=>w.status==='submitted').length;const b=document.getElementById('pb');if(!b)return;if(n>0){b.style.display='inline-flex';b.textContent=n;}else b.style.display='none';}
function showM(html,id='m'){const ex=document.getElementById(id);if(ex)ex.remove();const ov=document.createElement('div');ov.id=id;ov.className='mo';ov.onclick=e=>{if(e.target===ov)closeM();};ov.innerHTML=`<div class="md">${html}</div>`;document.body.appendChild(ov);}
function closeM(){const m=document.querySelector('.mo');if(m)m.remove();}
let toastT;
function toast(msg,type=''){const old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;document.body.appendChild(t);clearTimeout(toastT);toastT=setTimeout(()=>t.remove(),3000);}
initApp();

</script>
</body>
</html>
