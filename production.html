<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#c8102e">
<title>VH Earthwork Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<style>
  :root{
    --bg:#fafafa; --bg2:#f0f0f0; --border:#e5e5e5;
    --text:#111; --text2:#555; --text3:#888;
    --red:#c8102e; --red-d:#a30d24;
    --green:#16a34a; --amber:#d97706;
    --shadow:0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;padding-bottom:env(safe-area-inset-bottom)}
  /* Header */
  .hdr{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:10}
  .hdr-in{max-width:1000px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px;letter-spacing:-.3px}
  .logo{width:30px;height:30px;background:var(--red);color:#fff;border-radius:6px;display:grid;place-items:center;font-size:13px;font-weight:800;flex-shrink:0}
  .uline{font-size:13px;color:var(--text2);display:flex;align-items:center;gap:8px;min-width:0}
  .uline .nm{font-weight:600;color:var(--text);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .rb{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);color:var(--text2);padding:3px 6px;border-radius:4px;flex-shrink:0}
  .rb.admin{background:#fee;color:var(--red)}
  .rb.manager{background:#fef3c7;color:var(--amber)}
  .container{max-width:1000px;margin:0 auto;padding:14px 16px 32px}
  /* Controls */
  .ctrl{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;align-items:flex-end}
  .cg{display:flex;flex-direction:column;gap:4px}
  .cg label{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
  .cg select,.cg input{font:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);min-width:0}
  .cg select{min-width:150px;max-width:200px}
  .cg.grow{flex:1}
  /* Buttons */
  .btn{font:inherit;font-size:13px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .btn:hover{background:var(--bg2)}
  .btn-p{background:var(--red);color:#fff;border-color:var(--red)}
  .btn-p:hover{background:var(--red-d)}
  .btn-sm{font-size:12px;padding:5px 10px}
  /* KPI grid */
  .kg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
  @media(min-width:520px){.kg{grid-template-columns:repeat(3,1fr)}}
  @media(min-width:780px){.kg{grid-template-columns:repeat(6,1fr)}}
  .k{background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px;box-shadow:var(--shadow);min-width:0}
  .k .lbl{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .k .val{font-size:20px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
  .k .sub{font-size:10px;color:var(--text3);margin-top:3px}
  .k.feat .val{font-size:24px}
  .val.good{color:var(--green)}
  .val.bad{color:var(--red)}
  .val .arr{font-size:14px;margin-right:2px;vertical-align:2px}
  .pbar{height:3px;background:var(--bg2);border-radius:2px;margin-top:6px;overflow:hidden}
  .pbarfill{height:100%;background:var(--red);transition:width .3s}
  .hdr{position:sticky;top:0;z-index:20;background:#fff}
  .dpre{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 14px}
  .dpre button{font:inherit;font-size:11px;padding:5px 10px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--text2);cursor:pointer}
  .dpre button.on{background:var(--red);color:#fff;border-color:var(--red)}
  .dpre button:hover:not(.on){background:var(--bg2)}
  .dq{font-size:11px;color:var(--text3);margin:-8px 0 10px;padding:6px 10px;background:var(--bg2);border-radius:4px}
  /* Sections */
  .sec{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .sec h2{font-size:14px;font-weight:700;margin-bottom:10px;letter-spacing:-.3px;color:var(--text)}
  .sec .h2-sub{font-size:11px;color:var(--text3);font-weight:500;margin-left:6px}
  /* Table */
  .tbl{width:100%;font-size:13px;border-collapse:collapse}
  .tbl thead th{font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;padding:8px 6px;text-align:left;border-bottom:1px solid var(--border)}
  .tbl tbody td{padding:9px 6px;border-bottom:1px solid var(--bg2);font-variant-numeric:tabular-nums}
  .tbl tbody tr:last-child td{border-bottom:none}
  .tbl .num{text-align:right}
  .tbl .vp{color:var(--red);font-weight:600}
  .tbl .vn{color:var(--green);font-weight:600}
  @media(max-width:600px){
    .tbl thead{display:none}
    .tbl,.tbl tbody,.tbl tr{display:block}
    .tbl tbody tr{padding:10px 0;border-bottom:1px solid var(--border)}
    .tbl tbody tr:last-child{border-bottom:none}
    .tbl tbody td{display:flex;justify-content:space-between;padding:4px 0;border:none;font-size:13px}
    .tbl tbody td::before{content:attr(data-label);font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .tbl tbody td.num{text-align:right}
  }
  /* Recent entries */
  .e{padding:11px 0;border-bottom:1px solid var(--bg2);display:flex;justify-content:space-between;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
  .e:hover{background:#fafafa}
  .e:last-child{border-bottom:none}
  .e-main{flex:1;min-width:0}
  .e-title{font-weight:600;font-size:14px;margin-bottom:2px;color:var(--text)}
  .e-sub{font-size:11px;color:var(--text2)}
  .e-yard{font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;text-align:right;white-space:nowrap}
  .e-yard .u{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase}
  /* Empty/loading */
  .empty,.loading{padding:32px 16px;text-align:center;color:var(--text2);font-size:14px}
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--bg2);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* Modal */
  .mo{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:100;padding:0;animation:fadeIn .15s}
  @media(min-width:600px){.mo{align-items:center;padding:20px}}
  .md{background:#fff;width:100%;max-width:480px;border-radius:14px 14px 0 0;padding:20px;max-height:88vh;overflow-y:auto;animation:slideUp .2s}
  @media(min-width:600px){.md{border-radius:12px;animation:none}}
  @keyframes fadeIn{from{opacity:0}}
  @keyframes slideUp{from{transform:translateY(20px)}}
  .md h3{font-size:17px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
  .md .meta{font-size:12px;color:var(--text2);margin-bottom:14px}
  .dr{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--bg2);font-size:13px;gap:12px}
  .dr:last-of-type{border-bottom:none}
  .dr .lk{color:var(--text2);flex-shrink:0}
  .dr .vk{font-weight:600;text-align:right;font-variant-numeric:tabular-nums}
  .mf{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
  /* Toast */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;z-index:200;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:fadeIn .15s}
  .toast.err{background:var(--red)}
  /* Auth screen */
  .auth{display:grid;place-items:center;min-height:80vh;padding:20px}
  .auth-c{background:#fff;border:1px solid var(--border);border-radius:12px;padding:32px 24px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow)}
  .auth-c .brand{justify-content:center;margin-bottom:18px}
  .auth-c h1{font-size:22px;font-weight:700;margin-bottom:8px;letter-spacing:-.5px}
  .auth-c p{color:var(--text2);font-size:14px;margin-bottom:22px;line-height:1.4}
.vt{display:inline-flex;background:#f5f5f7;border-radius:8px;padding:3px;margin-bottom:14px;gap:2px}.vt button{font:inherit;font-size:13px;font-weight:600;padding:6px 14px;border:none;background:transparent;color:#666;cursor:pointer;border-radius:6px;transition:background .12s,color .12s;display:inline-flex;align-items:center;gap:6px}.vt button.on{background:#fff;color:#c8102e;box-shadow:0 1px 2px rgba(0,0,0,.06)}.vt button:not(.on):hover{color:#111}.day-card{background:#fff;border:1px solid #eaeaea;border-radius:8px;padding:12px 14px;margin-bottom:8px}.day-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;font-weight:700;font-size:13px}.day-totals{font-weight:400;font-size:12px;color:#666}.day-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}.day-col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#666;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #eaeaea}.day-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;font-size:13px;border-bottom:1px solid #f5f5f5}.day-row:last-child{border-bottom:none}.day-row.legacy{color:#999;font-style:italic}.day-name{flex:1;min-width:0}.day-name .day-sub{font-size:11px;color:#888;margin-left:4px}.day-hrs{font-weight:600;margin-left:8px;white-space:nowrap}.day-empty{font-size:12px;color:#888;padding:6px 0;font-style:italic}@media (max-width:640px){.day-cols{grid-template-columns:1fr;gap:8px}}.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}.modal-pn{background:#fff;border-radius:12px;max-width:900px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,.2);overflow:hidden}.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #eaeaea}.modal-hdr h2{margin:0;font-size:18px}.modal-body{padding:16px 20px;overflow:auto;flex:1}.modal-sec{margin-bottom:20px}.modal-sec h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;color:#666;margin:0 0 10px}.bud-form{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.bud-form input,.bud-form select{font:inherit;font-size:13px;padding:8px 10px;border:1px solid #ddd;border-radius:6px;width:100%;box-sizing:border-box}.bud-form-actions{display:flex;justify-content:flex-end;gap:8px}.bud-form-actions .btn{padding:8px 16px}@media (max-width:640px){.bud-form{grid-template-columns:1fr 1fr}}summary.day-hdr{cursor:pointer;list-style:none;outline:none;user-select:none}summary.day-hdr::-webkit-details-marker{display:none}summary.day-hdr::before{content:'\25B8';color:#c8102e;margin-right:7px;font-size:11px}details[open]>summary.day-hdr::before{content:'\25BE'}details.day-card[open]>summary.day-hdr{margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eaeaea}.day-date{flex:1;min-width:0}.day-prod{margin-bottom:12px}.day-prod .day-row.prod-row{cursor:pointer}.day-prod .day-row.prod-row:hover{background:#fafafa}.day-prod .day-row.prod-row{align-items:flex-start}.day-name .prod-title{display:block}.prod-meta{font-size:11px;color:#666;margin-top:2px;line-height:1.4}.prod-note{font-size:11px;color:#888;font-style:italic;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}.day-hrs .u{font-size:10px;color:#999;font-weight:500;text-transform:uppercase;margin-left:1px}</style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><div>Loading...</div></div></div>
<div id="toasts"></div>
<script>
// === CONFIG ===
const CLIENT_ID='127c307a-e672-4d13-b5e9-c3b96fb34759';
const TENANT_ID='1585f578-f5d3-41e6-a437-9c59bd33fbcf';
const SCOPES=['Files.ReadWrite','Files.ReadWrite.All','Sites.ReadWrite.All','User.Read','offline_access'];
const FD_SITE='valentiheld.sharepoint.com,faa2c371-4166-4fc1-aed9-bf6ff65c7034,d89c0495-1617-4429-b05b-7addf584b82e';
const FD_LIST='0e317e27-adb1-4bef-b57a-cb0524e60981';
const TS_SITE='valentiheld.sharepoint.com,155c9359-7fd3-4f2c-8c6a-b04a722b6f64,801969a1-b2a1-4f9a-8c3a-05ae5405e710';
// Fallback role detection if vhts-state.json can't be loaded
const FALLBACK_ADMINS=['dmorris@valentiheld.com','abewley@valentiheld.com','jroe@valentiheld.com','jtrenkamp@valentiheld.com','cbroeker@valentiheld.com','eroe@valentiheld.com','cwaters@valentiheld.com','mzielinski@valentiheld.com','mjanson@valentiheld.com','kpero@valentiheld.com','jschuetz@valentiheld.com'];
const FALLBACK_MANAGERS=['jroe@valentiheld.com','jtrenkamp@valentiheld.com'];
const EARTH_PHASES=['300','310'];
const UTIL_PHASES=['400','450','500','600'];
const BUDGETS_LIST='9d5a39ab-23ff-41f5-9dd5-40fe40f56323';
const TSJL_LIST='228b5d0b-c95c-4bd0-a9b2-b963d767b7d2';

let mi;
let auth={user:null,account:null,isAdmin:false,isManager:false,role:'foreman'};
let S={view:'earth',rows:[],foremen:[],jobs:[],phases:[],selectedForeman:'',selectedJob:'',selectedPhase:'',dateFrom:null,dateTo:null,adminEmails:[],managers:[],budgets:{},jobLines:[],showSettings:false};

// === MSAL ===
async function initMsal(){
  if(typeof msal==='undefined'||!msal.PublicClientApplication){
    throw new Error('MSAL library failed to load from CDN. Check network/CSP and retry.');
  }
  mi=new msal.PublicClientApplication({
    auth:{clientId:CLIENT_ID,authority:`https://login.microsoftonline.com/${TENANT_ID}`,redirectUri:window.location.origin+window.location.pathname},
    cache:{cacheLocation:'localStorage'}
  });
  await mi.initialize();
  await mi.handleRedirectPromise();
  const accs=mi.getAllAccounts();
  if(accs.length>0){
    auth.account=accs[0];
    auth.user={name:accs[0].name,email:(accs[0].username||'').toLowerCase()};
    await loadRoles();
    await loadData();
    await Promise.all([loadBudgets(),loadJobLines()]);
    render();
  } else {
    renderAuth();
  }
}
async function signIn(){await mi.loginRedirect({scopes:SCOPES,prompt:'select_account'});}
async function signOut(){await mi.logoutRedirect();}
async function getToken(){
  try{const r=await mi.acquireTokenSilent({scopes:SCOPES,account:auth.account});return r.accessToken;}
  catch(e){if(e instanceof msal.InteractionRequiredAuthError)await mi.acquireTokenRedirect({scopes:SCOPES,account:auth.account});return null;}
}

// === DATA ===
async function loadRoles(){
  // Try to load shared state from the timesheet app's VHTimesheets site
  try{
    const tok=await getToken();if(!tok)throw new Error('no token');
    const r=await fetch(`https://graph.microsoft.com/v1.0/sites/${TS_SITE}/drive/root:/vhts-state.json:/content`,{headers:{Authorization:'Bearer '+tok}});
    if(r.ok){
      const j=await r.json();
      S.adminEmails=(j.adminEmails||[]).map(e=>(e||'').toLowerCase());
      S.managers=j.managers||[];
    } else throw new Error('state file not found');
  }catch(e){
    console.warn('Using fallback role lists:',e.message);
    S.adminEmails=FALLBACK_ADMINS.map(e=>e.toLowerCase());
    S.managers=FALLBACK_MANAGERS.map(e=>({email:e}));
  }
  auth.isAdmin=S.adminEmails.includes(auth.user.email);
  auth.isManager=S.managers.some(m=>(m.email||'').toLowerCase()===auth.user.email);
  auth.role=auth.isAdmin?'admin':(auth.isManager?'manager':'foreman');
  if(auth.role==='foreman')S.selectedForeman=auth.user.name;
}

async function loadData(){
  try{
    const tok=await getToken();if(!tok)return;
    const now=new Date();
    if(!S.dateFrom||!S.dateTo){
      // Default view = current week (Sunday → today), matching the "This Week" preset
      const f=new Date(now);f.setDate(now.getDate()-now.getDay());
      S.dateFrom=isoDate(f);S.dateTo=isoDate(now);S.dpre='week';
    }

    const fields='Id,Title,Date,Foreman,Jobnumber,Phase,Yardage_x002f_production,Unit,BidCost,ActualCost,TotalCost,Bid_x0020_Cost_x0020_Per_x0020_Y,Actual_x0020_Cost_x0020_Per_x002,Labor_x0020_Hours,Crew_x0020_Size,Production_x0020_Hours,Equipment,STR_x0020_ID,Work_x0020_Type,Notes';
    const url=`https://graph.microsoft.com/v1.0/sites/${FD_SITE}/lists/${FD_LIST}/items?$expand=fields($select=${fields})&$top=500`;
    const r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
    if(!r.ok)throw new Error('Graph '+r.status);
    const j=await r.json();
    // Keep every row with a date and a numeric phase; the view split (earth 0–399 / util 400+)
    // is applied later by phaseInView, so no earthwork phase gets dropped at load.
    S.rows=(j.value||[]).map(it=>it.fields).filter(f=>f&&f.Date&&!isNaN(parseInt(f.Phase,10)));
    S.foremen=[...new Set(S.rows.map(r=>r.Foreman).filter(Boolean))].sort();
    S.jobs=[...new Set(S.rows.map(r=>r.Jobnumber).filter(Boolean))].sort();
    S.phases=[...new Set(S.rows.map(r=>r.Phase).filter(Boolean))].sort();
  }catch(e){
    console.error('loadData:',e);
    toast('Failed to load production data.','err');
  }
}

async function loadBudgets(){
  try{
    const tok=await getToken();if(!tok)return;
    const url='https://graph.microsoft.com/v1.0/sites/'+FD_SITE+'/lists/'+BUDGETS_LIST+'/items?$expand=fields($select=JobNumber,JobName,Phase,PhaseType,BidCost,BidQty,QtyUnit,BidHours)&$top=200';
    const r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
    if(!r.ok)return;
    const j=await r.json();
    S.budgets={};
    (j.value||[]).forEach(it=>{const b=Object.assign({__id:it.id},it.fields||{});S.budgets[b.JobNumber+'-'+b.Phase]=b;});
  }catch(e){console.warn('loadBudgets:',e);}
}
async function loadJobLines(){
  try{
    const tok=await getToken();if(!tok)return;
    const fields='WorkDate,EmployeeName,EmployeeTitle,Hours,Equipment,Jobnumber,Phase,SubmittedBy';
    const url='https://graph.microsoft.com/v1.0/sites/'+FD_SITE+'/lists/'+TSJL_LIST+'/items?$expand=fields($select='+fields+')&$top=1000';
    const r=await fetch(url,{headers:{Authorization:'Bearer '+tok}});
    if(!r.ok)return;
    const j=await r.json();
    S.jobLines=(j.value||[]).map(it=>it.fields).filter(f=>f&&f.WorkDate);
  }catch(e){console.warn('loadJobLines:',e);}
}
function parseEquipment(s){
  if(!s)return [];
  if(s.indexOf('[object Object]')>=0){
    const count=s.split(',').length;
    return [{name:'('+count+' unrecorded item'+(count>1?'s':'')+')',hours:0,legacy:true}];
  }
  try{const arr=JSON.parse(s);return Array.isArray(arr)?arr:[];}
  catch(e){return [{name:String(s),hours:0}];}
}
function prepDailyBreakdown(){
  const phases=viewPhases();
  const from=S.dateFrom?new Date(S.dateFrom+'T00:00:00'):null;
  const to=S.dateTo?new Date(S.dateTo+'T23:59:59'):null;
  const passes=function(r,useDate){
    if(!phaseInView(r.Phase))return false;
    if(S.selectedJob&&r.Jobnumber!==S.selectedJob)return false;
    if(S.selectedPhase&&r.Phase!==S.selectedPhase)return false;
    if(useDate){
      const d=r.WorkDate?new Date(r.WorkDate):null;if(!d)return false;
      if(from&&d<from)return false;
      if(to&&d>to)return false;
    }
    return true;
  };
  const inRange=S.jobLines.filter(r=>passes(r,true));
  const allTime=S.jobLines.filter(r=>passes(r,false));
  const byDate={};
  inRange.forEach(r=>{
    const dk=(r.WorkDate||"").slice(0,10);if(!dk)return;
    if(!byDate[dk])byDate[dk]={date:dk,crew:{},equip:{}};
    const total=parseFloat(r.Hours)||0;
    // Sum this line's equipment hours; true labor = total worked minus time spent running equipment.
    const eq=parseEquipment(r.Equipment);
    let rowEquip=0;
    eq.forEach(e=>{
      const ek=((e.description||e.name||"")+(e.number?" #"+e.number:""))||e.id||e.equipNum||"(unknown)";
      if(!byDate[dk].equip[ek])byDate[dk].equip[ek]={name:ek,hours:0,legacy:!!e.legacy};
      const eh=parseFloat(e.hours)||0;
      byDate[dk].equip[ek].hours+=eh;
      rowEquip+=eh;
    });
    const labor=Math.max(0,total-rowEquip);
    const empKey=r.EmployeeName||"Unknown";
    if(!byDate[dk].crew[empKey])byDate[dk].crew[empKey]={name:empKey,title:r.EmployeeTitle||'',hours:0};
    byDate[dk].crew[empKey].hours+=labor;
  });
  const days=Object.values(byDate).map(d=>{
    const crewArr=Object.values(d.crew).sort((a,b)=>b.hours-a.hours);
    const equipArr=Object.values(d.equip).sort((a,b)=>b.hours-a.hours);
    const laborTotal=crewArr.reduce((s,c)=>s+c.hours,0);
    const equipTotal=equipArr.reduce((s,e)=>s+e.hours,0);
    const dt=new Date(d.date+'T00:00:00');
    const dateLabel=dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    return{date:d.date,dateLabel,crew:crewArr,equip:equipArr,laborTotal,equipTotal};
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let totalLabor=0,totalEquip=0;const dateSet=new Set();
  allTime.forEach(r=>{
    if(r.WorkDate)dateSet.add(r.WorkDate.slice(0,10));
    let rowEquip=0;
    parseEquipment(r.Equipment).forEach(e=>{const eh=parseFloat(e.hours)||0;totalEquip+=eh;rowEquip+=eh;});
    totalLabor+=Math.max(0,(parseFloat(r.Hours)||0)-rowEquip);
  });
  return{days,totalLabor,totalEquip,daysWorked:dateSet.size,rangeRowCount:inRange.length};
}

function viewPhases(){return S.view==='earth'?EARTH_PHASES:UTIL_PHASES;}
// Merge production entries (Field Data) with crew/equipment (TimesheetJobLines) into one
// per-day structure for the collapsible Daily Production roll-up. `rows` is the already-
// filtered production set from render() so production-entry indexes align with window._recent.
function prepDailyRollup(rows){
  const dB=prepDailyBreakdown();
  const ce={};dB.days.forEach(d=>{ce[d.date]=d;});
  const byDate={};
  rows.forEach((r,idx)=>{
    const dk=(r.Date||'').slice(0,10);if(!dk)return;
    if(!byDate[dk])byDate[dk]={prod:[],yards:0,cost:0};
    const y=parseFloat(r.Yardage_x002f_production)||0;
    byDate[dk].yards+=y;
    byDate[dk].cost+=parseFloat(r.TotalCost)||parseFloat(r.ActualCost)||0;
    byDate[dk].prod.push({job:r.Jobnumber||'?',phase:r.Phase||'?',yards:y,unit:r.Unit||unitLabel(),foreman:r.Foreman||'',workType:r.Work_x0020_Type||'',prodHours:parseFloat(r.Production_x0020_Hours)||0,strId:r.STR_x0020_ID||'',notes:r.Notes||'',idx:idx});
  });
  const allDates=new Set(Object.keys(byDate).concat(Object.keys(ce)));
  const days=[...allDates].map(dk=>{
    const p=byDate[dk]||{prod:[],yards:0,cost:0};
    const c=ce[dk]||{crew:[],equip:[],laborTotal:0,equipTotal:0};
    const dt=new Date(dk+'T00:00:00');
    const dateLabel=dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    return{date:dk,dateLabel,prod:p.prod,yards:p.yards,cost:p.cost,crew:c.crew,equip:c.equip,laborTotal:c.laborTotal,equipTotal:c.equipTotal};
  }).sort((a,b)=>new Date(b.date)-new Date(a.date));
  return{days,totalLabor:dB.totalLabor,totalEquip:dB.totalEquip,daysWorked:dB.daysWorked};
}
// Earthwork = phases 0–399; Utility = 400+. Numeric range so phases like 320/350 are included.
function phaseInView(phase){const p=parseInt(phase,10);if(isNaN(p))return false;return S.view==='earth'?(p>=0&&p<400):(p>=400);}
function rowMatchesView(r){return phaseInView(r.Phase);}
function unitLabel(){return S.view==='earth'?'CY':'LF';}

// === HELPERS ===
function isoDate(d){return d.toISOString().slice(0,10);}
function fmtNum(n,d){d=d||0;if(!isFinite(n))return '—';return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtMoney(n,d){d=d==null?2:d;if(!isFinite(n)||n===0)return '—';return '$'+n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d});}
function fmtVar(v){if(!isFinite(v)||v===0)return '—';return (v<0?'-':'+')+'$'+Math.abs(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtDate(s){if(!s)return '—';const d=new Date(s);return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function startOfWeek(d){const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()-day);r.setHours(0,0,0,0);return r;}
function esc(s){return String(s==null?'':s).replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));}

function filteredRows(){
  const from=S.dateFrom?new Date(S.dateFrom+'T00:00:00'):null;
  const to=S.dateTo?new Date(S.dateTo+'T23:59:59'):null;
  return S.rows.filter(r=>{
    if(!rowMatchesView(r))return false;
    const d=r.Date?new Date(r.Date):null;if(!d)return false;
    if(from&&d<from)return false;
    if(to&&d>to)return false;
    if(S.selectedForeman&&r.Foreman!==S.selectedForeman)return false;
    if(S.selectedJob&&r.Jobnumber!==S.selectedJob)return false;
    if(S.selectedPhase&&r.Phase!==S.selectedPhase)return false;
    return true;
  });
}
function thisWeekRows(){
  const sow=startOfWeek(new Date());
  return S.rows.filter(r=>{
    if(!rowMatchesView(r))return false;
    if(S.selectedForeman&&r.Foreman!==S.selectedForeman)return false;
    if(S.selectedJob&&r.Jobnumber!==S.selectedJob)return false;
    if(S.selectedPhase&&r.Phase!==S.selectedPhase)return false;
    return r.Date&&new Date(r.Date)>=sow;
  });
}
// All-time rows for the selected job/phase/foreman, ignoring date range.
// Used by the "Accumulated Cost" and "Total Yards to Date" KPIs.
function allTimeRows(){
  return S.rows.filter(r=>{
    if(!rowMatchesView(r))return false;
    if(S.selectedForeman&&r.Foreman!==S.selectedForeman)return false;
    if(S.selectedJob&&r.Jobnumber!==S.selectedJob)return false;
    if(S.selectedPhase&&r.Phase!==S.selectedPhase)return false;
    return true;
  });
}
function aggregate(rows){
  let yards=0,totalCost=0,bidYardsForBid=0,bidWeighted=0,laborHours=0,prodHours=0;
  rows.forEach(r=>{
    const y=parseFloat(r.Yardage_x002f_production)||0;
    yards+=y;
    // TotalCost (entered by foreman in production form), fall back to ActualCost
    // (populated on baseline rows from the historical import)
    totalCost+=parseFloat(r.TotalCost)||parseFloat(r.ActualCost)||0;
    // Bid $/CY — only include rows that actually have bid data; otherwise baseline
    // rows (where bid was never entered) drag the weighted avg toward 0.
    const bc=parseFloat(r.BidCost)||0;
    const bcpy=parseFloat(r.Bid_x0020_Cost_x0020_Per_x0020_Y)||0;
    const effectiveBcpy=bcpy>0?bcpy:(bc>0&&y>0?bc/y:0);
    if(effectiveBcpy>0&&y>0){
      bidYardsForBid+=y;
      bidWeighted+=effectiveBcpy*y;
    }
    laborHours+=parseFloat(r.Labor_x0020_Hours)||0;
    prodHours+=parseFloat(r.Production_x0020_Hours)||0;
  });
  const cpy=yards>0?totalCost/yards:0;
  const bcpy=bidYardsForBid>0?bidWeighted/bidYardsForBid:0;
  const variance=(cpy>0&&bcpy>0)?cpy-bcpy:0;
  const productivity=laborHours>0?yards/laborHours:0;
  return{yards,totalCost,bidCost:bidWeighted,laborHours,prodHours,cpy,bcpy,variance,productivity};
}

    if(S.selectedPhase&&b.Phase!==S.selectedPhase)return false;
    return true;

  const _budTotals=_matchingBuds.reduce((acc,b)=>{
    acc.bidCost+=parseFloat(b.BidCost)||0;

  if(_budTotals.bidCost>0&&_budTotals.bidQty>0){

function showDetail(i){
  const r=window._recent[i];if(!r)return;
  const y=parseFloat(r.Yardage_x002f_production)||0;

  const cpy=y>0&&total>0?total/y:0;
  const bcpy=parseFloat(r.Bid_x0020_Cost_x0020_Per_x0020_Y)||0;
  const v=cpy>0&&bcpy>0?cpy-bcpy:0;
  const labor=parseFloat(r.Labor_x0020_Hours)||0;
  const prod=parseFloat(r.Production_x0020_Hours)||0;
  const u=esc(r.Unit||(phaseInView(r.Phase)?unitLabel():(parseInt(r.Phase,10)>=400?'LF':'CY')));
  const rows=[
    ['Quantity',fmtNum(y)+' '+u],
    ['Total Cost',fmtMoney(total)],
    ['Cost / '+u+' (Actual)',fmtMoney(cpy)],
    ['Bid Cost / '+u,fmtMoney(bcpy)],
    ['Variance ($/'+u+')',`<span class="${v<0?'vn':'vp'}">${fmtVar(v)}</span>`],
    ['Labor Hours',fmtNum(labor,1)],
    ['Production Hours',fmtNum(prod,1)],
    r.Crew_x0020_Size?['Crew Size',esc(r.Crew_x0020_Size)]:null,
    r.Work_x0020_Type?['Work Type',esc(r.Work_x0020_Type)]:null,
    r.Equipment?['Equipment',esc(r.Equipment)]:null,
    r.STR_x0020_ID?['STR ID',esc(r.STR_x0020_ID)]:null,
    r.Notes?['Notes',esc(r.Notes)]:null
  ].filter(Boolean);
  const html=`
    <h3>${esc(r.Jobnumber||'?')} · Phase ${esc(r.Phase||'?')}</h3>
    <div class="meta">${fmtDate(r.Date)} · ${esc(r.Foreman||'—')}</div>
    ${rows.map(([l,v])=>`<div class="dr"><span class="lk">${l}</span><span class="vk">${v}</span></div>`).join('')}
    <div class="mf"><button class="btn" onclick="closeMo()">Close</button></div>`;
  const mo=document.createElement('div');
  mo.className='mo';
  mo.onclick=e=>{if(e.target===mo)closeMo();};
  mo.innerHTML=`<div class="md">${html}</div>`;
  document.body.appendChild(mo);
}
function closeMo(){const m=document.querySelector('.mo');if(m)m.remove();}

function toggleSettings(){S.showSettings=!S.showSettings;render();}
function renderSettingsModal(){
  const list=Object.values(S.budgets).sort((a,b)=>(''+(a.JobNumber||'')).localeCompare(b.JobNumber||'')||(''+(a.Phase||'')).localeCompare(b.Phase||''));
  const rows=list.map(b=>'<tr>'+
    '<td>'+esc(b.JobNumber||'')+(b.JobName?'<div style="font-size:11px;color:#666">'+esc(b.JobName)+'</div>':'')+'</td>'+
    '<td>'+esc(b.Phase||'')+'</td>'+
    '<td>'+esc(b.PhaseType||'')+'</td>'+
    '<td class="num">'+(b.BidCost?fmtMoney(b.BidCost,0):'—')+'</td>'+
    '<td class="num">'+(b.BidQty?fmtNum(b.BidQty):'—')+'</td>'+
    '<td>'+esc(b.QtyUnit||'')+'</td>'+
    '<td class="num">'+(b.BidHours?fmtNum(b.BidHours,1):'—')+'</td>'+
    '<td><button class="btn btn-sm" onclick="deleteBudget(\''+b.__id+'\')" title="Delete"><i class="ti ti-trash"></i></button></td>'+
  '</tr>').join('');
  const tbl=list.length===0?'<div class="empty">No budgets yet. Add one above.</div>':
    '<table class="tbl"><thead><tr><th>Job</th><th>Phase</th><th>Type</th><th class="num">Bid $</th><th class="num">Bid Qty</th><th>Unit</th><th class="num">Bid Hrs</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  return '<div class="modal-ov" onclick="if(event.target===this)toggleSettings()">'+
    '<div class="modal-pn">'+
      '<div class="modal-hdr"><h2>Job Budgets</h2><button class="btn btn-sm" onclick="toggleSettings()" title="Close"><i class="ti ti-x"></i></button></div>'+
      '<div class="modal-body">'+
        '<div class="modal-sec"><h3>Add new budget</h3>'+
          '<div class="bud-form">'+
            '<input id="bud-jn" placeholder="Job Number (e.g. 2610)">'+
            '<input id="bud-jname" placeholder="Job Name">'+
            '<input id="bud-ph" placeholder="Phase (e.g. 300)">'+
            '<select id="bud-pt"><option value="earth">earth</option><option value="utility">utility</option></select>'+
            '<input id="bud-bc" type="number" placeholder="Bid Cost ($)" step="0.01">'+
            '<input id="bud-bq" type="number" placeholder="Bid Qty" step="0.01">'+
            '<select id="bud-qu"><option value="">unit</option><option value="CY">CY</option><option value="SY">SY</option><option value="LF">LF</option></select>'+
            '<input id="bud-bh" type="number" placeholder="Bid Hours" step="0.01">'+
          '</div>'+
          '<div class="bud-form-actions"><button class="btn btn-p" onclick="saveBudget()"><i class="ti ti-plus"></i> Add Budget</button></div>'+
        '</div>'+
        '<div class="modal-sec"><h3>Existing budgets ('+list.length+')</h3>'+tbl+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}
async function saveBudget(){
  const gv=id=>(document.getElementById(id)||{}).value||'';
  const jn=gv('bud-jn').trim();const ph=gv('bud-ph').trim();
  if(!jn||!ph){toast('Job Number and Phase required','err');return;}
  const payload={Title:jn+'-'+ph,JobNumber:jn,Phase:ph,PhaseType:gv('bud-pt')||'earth'};
  const jname=gv('bud-jname').trim();if(jname)payload.JobName=jname;
  const bc=parseFloat(gv('bud-bc'));if(!isNaN(bc))payload.BidCost=bc;
  const bq=parseFloat(gv('bud-bq'));if(!isNaN(bq))payload.BidQty=bq;
  const qu=gv('bud-qu');if(qu)payload.QtyUnit=qu;
  const bh=parseFloat(gv('bud-bh'));if(!isNaN(bh))payload.BidHours=bh;
  try{
    const tok=await getToken();if(!tok){toast('Auth failed','err');return;}
    const url='https://graph.microsoft.com/v1.0/sites/'+FD_SITE+'/lists/'+BUDGETS_LIST+'/items';
    const r=await fetch(url,{method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify({fields:payload})});
    if(!r.ok){const t=await r.text();toast('Save failed: '+t.slice(0,120),'err');return;}
    toast('Budget added','ok');
    ['bud-jn','bud-jname','bud-ph','bud-bc','bud-bq','bud-bh'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    await loadBudgets();render();
  }catch(e){toast('Error: '+e.message,'err');}
}
async function deleteBudget(id){
  if(!confirm('Delete this budget?'))return;
  try{
    const tok=await getToken();if(!tok){toast('Auth failed','err');return;}
    const url='https://graph.microsoft.com/v1.0/sites/'+FD_SITE+'/lists/'+BUDGETS_LIST+'/items/'+id;
    const r=await fetch(url,{method:'DELETE',headers:{Authorization:'Bearer '+tok}});
    if(!r.ok){toast('Delete failed','err');return;}
    toast('Deleted','ok');await loadBudgets();render();
  }catch(e){toast('Error: '+e.message,'err');}
}
function setDatePreset(preset){
  S.dpre=preset;
  const today=new Date();
  const todayIso=isoDate(today);
  if(preset==='week'){
    const d=new Date(today);d.setDate(today.getDate()-today.getDay());
    S.dateFrom=isoDate(d);S.dateTo=todayIso;
  }else if(preset==='lastWeek'){
    const d=new Date(today);d.setDate(today.getDate()-today.getDay()-7);
    const e=new Date(d);e.setDate(d.getDate()+6);
    S.dateFrom=isoDate(d);S.dateTo=isoDate(e);
  }else if(preset==='mtd'){
    S.dateFrom=isoDate(new Date(today.getFullYear(),today.getMonth(),1));S.dateTo=todayIso;
  }else if(preset==='last30'){
    const d=new Date(today);d.setDate(today.getDate()-30);
    S.dateFrom=isoDate(d);S.dateTo=todayIso;
  }else if(preset==='ptd'){
    const dates=(S.rows||[]).map(r=>r.Date||r.fields&&r.fields.Date).filter(Boolean).sort();
    S.dateFrom=dates.length?dates[0].slice(0,10):'2026-01-01';S.dateTo=todayIso;
  }
  render();
}
function setView(v){S.view=v;S.selectedPhase='';render();}
function setForeman(v){S.selectedForeman=v;render();}
function setJob(v){S.selectedJob=v;render();}
function setPhase(v){S.selectedPhase=v;render();}
function setDate(which,v){if(which==='from')S.dateFrom=v;else S.dateTo=v;render();}
async function refresh(){toast('Refreshing...');await loadData();render();toast('Updated.');}
function toast(msg,type){
  const t=document.createElement('div');
  t.className='toast'+(type==='err'?' err':'');
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),2400);
}

initMsal().catch(e=>{
  console.error(e);
  document.getElementById('app').innerHTML=`<div class="auth"><div class="auth-c"><h1>Setup error</h1><p style="font-family:monospace;font-size:12px">${esc(e.message||String(e))}</p></div></div>`;
});
